# AUDIT-CI-01 — Visual Editor audit / safety-net workflow.
#
# This workflow runs the full Visual Editor test suite (backend pytest +
# frontend vitest + Playwright e2e) on every push to ``main`` and on every
# pull request targeting ``main``. The audit suites (DAG fuzz, smoke
# full-journey, UI crawler) run alongside the existing 569 backend +
# 316 frontend + 3 Playwright tests so a regression in either lane fails
# the build.
#
# Locally the same gates can be invoked through ``make ci-local`` from
# ``deepcell/`` — see ``deepcell/Makefile`` and
# ``deepcell/docs/AUDIT.md``.

name: audit

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel any in-flight runs for the same ref so a rapid push doesn't pile
# up Slurm-equivalent CI work.
concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: backend (pytest + DAG fuzz)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: deepcell/backend
    env:
      # The audit suites and a handful of integration tests assume the
      # PostgreSQL-less fixture mode. Setting this here keeps CI from
      # depending on a real Postgres in the runner image.
      EDITOR_DISABLE_PG: '1'
      # Reduce log volume in CI; the backend default is INFO.
      EDITOR_LOG_LEVEL: WARNING
      PYTHONDONTWRITEBYTECODE: '1'
      PIP_DISABLE_PIP_VERSION_CHECK: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            deepcell/backend/requirements.txt
            deepcell/backend/pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Editable install so ``finkbeiner_editor`` is importable for the
          # tests, plus the [dev] extras (pytest, pytest-asyncio, ruff,
          # jsonschema).
          pip install -e '.[dev]'

      - name: Run full backend test suite (must remain at 569+ passing)
        run: pytest -q

      - name: Run DAG fuzz suite (AUDIT-BE-01)
        run: pytest -q tests/integration/test_dag_fuzz.py -v

      - name: Upload fuzz coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dag-fuzz-coverage
          path: |
            deepcell/backend/tests/integration/.fuzz-coverage.json
            deepcell/backend/tests/integration/fuzz-coverage.json
          if-no-files-found: ignore
          retention-days: 14

  frontend-tests:
    name: frontend (typecheck + vitest + Playwright)
    runs-on: ubuntu-latest
    needs: backend-tests
    defaults:
      run:
        shell: bash
        working-directory: deepcell/frontend
    env:
      CI: 'true'
      # The Playwright webServer in playwright.config.ts boots its own
      # FastAPI backend on :8000 with EDITOR_DISABLE_PG=1 — but we still
      # need the backend venv populated for that subprocess to start.
      EDITOR_DISABLE_PG: '1'
      EDITOR_LOG_LEVEL: WARNING
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: deepcell/frontend/package-lock.json

      # The Playwright config's webServer boots the backend via the
      # checked-in venv path. In CI that venv does not exist, so we
      # install Python and a fresh venv at the same location the spec
      # expects (``deepcell/backend/.venv``).
      - name: Set up Python 3.11 (for Playwright webServer backend)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Provision backend venv for Playwright webServer
        working-directory: deepcell/backend
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install -e '.[dev]'

      - name: Install frontend dependencies (npm ci)
        run: npm ci

      - name: Type-check TypeScript
        run: npm run typecheck

      - name: Run vitest unit suite
        run: npm test -- --run

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e suite
        env:
          # HTML report is opt-in via env; on CI we want it so failures
          # land as artifacts.
          PLAYWRIGHT_HTML_REPORT: '1'
        run: npx playwright test --reporter=line

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: deepcell/frontend/playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright traces and test-results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: deepcell/frontend/test-results
          if-no-files-found: ignore
          retention-days: 14
